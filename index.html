<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación | José Manuel y Zayr</title>

  <style>
    /* ===== ESTILOS GENERALES DE TODA LA PÁGINA ===== */
    body {
      margin: 0; /* Quita los márgenes por defecto del navegador */
      font-family: Georgia, "Times New Roman", serif; /* Tipo de letra elegante */
      background-color: #f8f3ee; /* Color de fondo */
      color: #4b3a2f; /* Color general del texto */
    }

    /* ===== CONTENEDOR PRINCIPAL ===== */
    .portada {
      min-height: 100vh; /* Hace que ocupe toda la altura de la pantalla */
      display: flex; /* Activa flexbox */
      justify-content: center; /* Centra horizontalmente */
      align-items: center; /* Centra verticalmente */
      padding: 20px; /* Espacio interno para que no pegue a los bordes */
      box-sizing: border-box;
    }

    /* ===== TARJETA CENTRAL ===== */
    .tarjeta {
      width: 100%;
      max-width: 420px; /* Ancho máximo en celular y escritorio */
      background-color: white;
      border-radius: 30px; /* Bordes redondeados */
      padding: 30px 20px;
      text-align: center; /* Centra el texto */
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); /* Sombra suave */
    }

    /* ===== TEXTO PEQUEÑO SUPERIOR ===== */
    .subtitulo {
      font-size: 16px;
      letter-spacing: 4px; /* Espaciado entre letras */
      color: #8b7a6b;
      margin-bottom: 15px;
      text-transform: uppercase; /* Convierte a mayúsculas */
    }

    /* ===== NOMBRES PRINCIPALES ===== */
    .nombres {
      font-size: 42px;
      line-height: 1.1;
      margin-bottom: 25px;
    }

    /* ===== IMAGEN DEL SOBRE ===== */
    .sobre {
      width: 100%;
      max-width: 260px; /* Limita el tamaño del sobre */
      display: block;
      margin: 0 auto 25px auto; /* Centra la imagen */
      border-radius: 12px;
    }

    /* ===== FECHA ===== */
    .fecha {
      font-size: 18px;
      letter-spacing: 1px;
      margin-top: 10px;
    }

    /* ===== TEXTO SECUNDARIO ===== */
    .texto-secundario {
      font-size: 14px;
      color: #8b7a6b;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 3px;
    }
  </style>
</head>
<body>

  <!-- CONTENEDOR PRINCIPAL -->
  <section class="portada">

    <!-- TARJETA CENTRAL -->
    <div class="tarjeta">

      <!-- TEXTO PEQUEÑO SUPERIOR -->
      <div class="subtitulo">Nuestra boda y bautizo</div>

      <!-- NOMBRES -->
      <div class="nombres">
        José Manuel <br> &amp; Zayr
      </div>

      <!-- IMAGEN DEL SOBRE -->
      <!-- Cambia la ruta si tu imagen tiene otro nombre o está en otra carpeta -->
      <img src="assets/sobre.jpeg" alt="Sobre de invitación" class="sobre">

      <!-- TEXTO PEQUEÑO DE FECHA -->
      <div class="texto-secundario">Sábado</div>

      <!-- FECHA -->
      <div class="fecha">09 de mayo de 2026</div>

    </div>
  </section>

</body>
</html>
