<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación | José Manuel y Zayr</title>

  <style>
    /* ======================================================
       VARIABLES DE COLOR
       Aquí puedes cambiar el estilo general de toda la invitación
    ====================================================== */|||
    :root{
      --fondo: #f7f1ea;
      --blanco: #ffffff;
      --texto: #4e382b;
      --texto-suave: #8b6f5a;
      --dorado: #c9a46a;
      --dorado-oscuro: #a67d45;
      --borde: #d9c7b6;
      --sombra: 0 12px 30px rgba(78, 56, 43, 0.10);
    }

    /* ======================================================
       ESTILOS GENERALES
    ====================================================== */
    *{
      box-sizing: border-box;
    }

    body{
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top, rgba(201,164,106,0.10), transparent 30%),
        linear-gradient(180deg, #fbf8f4 0%, var(--fondo) 100%);
      color: var(--texto);
    }

    .pantalla{
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .oculto{
      display: none;
    }

    /* ======================================================
       PRIMERA PANTALLA
    ====================================================== */
    .tarjeta{
      width: 100%;
      max-width: 430px;
      background: rgba(255,255,255,0.92);
      border-radius: 32px;
      padding: 34px 22px;
      text-align: center;
      box-shadow: var(--sombra);
      border: 1px solid rgba(201,164,106,0.16);
    }

    .subtitulo{
      font-size: 14px;
      letter-spacing: 4px;
      color: var(--texto-suave);
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    .nombres-principales{
      font-size: 42px;
      line-height: 1.08;
      margin-bottom: 24px;
      color: var(--texto);
    }

    .sobre{
      width: 100%;
      max-width: 260px;
      display: block;
      margin: 0 auto 24px auto;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .texto-secundario{
      font-size: 13px;
      color: var(--texto-suave);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    .fecha{
      font-size: 18px;
      margin-bottom: 24px;
    }

    .boton-abrir{
      background: linear-gradient(180deg, var(--dorado), var(--dorado-oscuro));
      color: white;
      border: none;
      padding: 15px 24px;
      border-radius: 999px;
      font-size: 16px;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 10px 24px rgba(166,125,69,0.20);
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .boton-abrir:hover{
      transform: translateY(-1px);
      opacity: 0.96;
    }

    /* ======================================================
       SEGUNDA PANTALLA
    ====================================================== */
    .contenido-invitacion{
      width: 100%;
      max-width: 900px;
      text-align: center;
      padding: 30px 10px 50px 10px;
    }

    .bloque-principal{
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(201,164,106,0.16);
      border-radius: 34px;
      box-shadow: var(--sombra);
      padding: 34px 22px 42px 22px;
      backdrop-filter: blur(6px);
    }

    .bienvenida{
      font-size: 22px;
      color: var(--texto);
      margin-bottom: 28px;
    }

    /* ======================================================
       CUENTA REGRESIVA
    ====================================================== */
    .countdown{
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      max-width: 760px;
      margin: 0 auto 46px auto;
    }

    .count-item{
      text-align: center;
    }

    .count-box{
      width: 92px;
      height: 92px;
      margin: 0 auto 12px auto;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 38px;
      font-weight: bold;
      color: var(--texto);
      background: linear-gradient(180deg, #ffffff, #f8f2ea);
      border: 1px solid var(--borde);
      border-radius: 22px;
      box-shadow: 0 6px 14px rgba(78,56,43,0.06);
    }

    .count-label{
      font-size: 20px;
      color: var(--texto-suave);
    }

    /* ======================================================
       TEXTO CENTRAL
    ====================================================== */
    .titulo-boda{
      font-size: 20px;
      letter-spacing: 1px;
      color: var(--texto-suave);
      margin-bottom: 10px;
    }

    .nombres-centro{
      font-size: 30px;
      line-height: 1.35;
      margin-bottom: 30px;
      color: var(--texto);
    }

    .ampersand{
      color: var(--dorado-oscuro);
      font-size: 34px;
    }

    /* ======================================================
       IMAGEN CENTRAL
    ====================================================== */
    .marco-imagen{
      width: 220px;
      height: 260px;
      margin: 0 auto 30px auto;
      padding: 10px;
      border-radius: 50% / 38%;
      background: linear-gradient(180deg, #f7ead8, #e8d3b4);
      box-shadow: 0 10px 24px rgba(78,56,43,0.10);
    }

    .imagen-central{
      width: 100%;
      height: 100%;
      border-radius: 50% / 38%;
      overflow: hidden;
      border: 2px solid rgba(78,56,43,0.15);
      background-color: white;
    }

    .imagen-central img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    /* ======================================================
       TEXTO BAUTIZO
    ====================================================== */
    .texto-bautizo{
      font-size: 24px;
      line-height: 1.45;
      color: var(--texto);
    }

    .texto-bautizo span{
      color: var(--texto-suave);
      font-size: 20px;
    }

    /* ======================================================
       BOTÓN DE MÚSICA
    ====================================================== */
    .barra-musica{
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(201,164,106,0.18);
      border-radius: 999px;
      padding: 8px;
      box-shadow: var(--sombra);
      backdrop-filter: blur(8px);
    }

    .musica-contenido{
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .boton-musica{
      background: linear-gradient(180deg, var(--dorado), var(--dorado-oscuro));
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 999px;
      font-size: 16px;
      cursor: pointer;
      font-family: inherit;
    }

    .estado-musica{
      color: var(--texto);
      font-size: 16px;
      padding-right: 8px;
    }

    /* ======================================================
       RESPONSIVE
    ====================================================== */
    @media (max-width: 700px){
      .nombres-principales{
        font-size: 36px;
      }

      .bloque-principal{
        padding: 28px 14px 36px 14px;
      }

      .bienvenida{
        font-size: 18px;
      }

      .countdown{
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        margin-bottom: 36px;
      }

      .count-box{
        width: 62px;
        height: 62px;
        font-size: 26px;
        border-radius: 16px;
      }

      .count-label{
        font-size: 15px;
      }

      .titulo-boda{
        font-size: 17px;
      }

      .nombres-centro{
        font-size: 22px;
      }

      .ampersand{
        font-size: 26px;
      }

      .marco-imagen{
        width: 180px;
        height: 220px;
      }

      .texto-bautizo{
        font-size: 18px;
      }

      .texto-bautizo span{
        font-size: 16px;
      }

      .barra-musica{
        top: 10px;
        width: calc(100% - 28px);
      }

      .musica-contenido{
        justify-content: center;
        flex-wrap: wrap;
      }

      .boton-musica{
        font-size: 15px;
        padding: 10px 16px;
      }

      .estado-musica{
        font-size: 15px;
      }

      .premium-invita{
      font-size: 13px;
      margin-bottom: 8px;
      }

      .premium-titulo-superior{
      font-size: 16px;
      letter-spacing: 3px;
      }
    }

    /* ======================================================
   SEGUNDA PANTALLA ESTILO PREMIUM
====================================================== */
.pantalla-estilo-premium{
  padding: 14px;
  align-items: stretch;
}

.premium-card{
  width: 100%;
  max-width: 430px;
  min-height: 92vh;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
  border-radius: 34px;
  background: #000;
  box-shadow: 0 16px 36px rgba(0,0,0,0.20);
}

/* Foto de fondo */
.premium-fondo{
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* Oscurece la foto ligeramente */
.premium-overlay{
  position: absolute;
  inset: 0;
  background: linear-gradient(
    180deg,
    rgba(0,0,0,0.18) 0%,
    rgba(0,0,0,0.22) 40%,
    rgba(0,0,0,0.38) 100%
  );
  z-index: 1;
}

/* Franja diagonal translúcida como en la referencia */
.premium-diagonal{
  position: absolute;
  top: -5%;
  left: -18%;
  width: 70%;
  height: 120%;
  background: rgba(255,255,255,0.18);
  transform: rotate(12deg);
  z-index: 2;
  backdrop-filter: blur(1px);
}

/* Contenido encima */
.premium-contenido{
  position: relative;
  z-index: 3;
  min-height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: center;
  text-align: center;
  padding: 90px 20px 150px 20px;
  color: white;
}

/* Adorno pequeño */
.premium-adorno{
  font-size: 28px;
  margin-bottom: 18px;
  opacity: 0.95;
}

/* Caja fina de nombres */
.premium-nombres-box{
  border: 1px solid rgba(255,255,255,0.72);
  padding: 16px 18px 14px 18px;
  width: 100%;
  max-width: 300px;
  background: rgba(0,0,0,0.08);
}

.premium-nombres{
  font-size: 34px;
  line-height: 1.1;
  letter-spacing: 1px;
  margin-bottom: 10px;
  color: white;
}

.premium-subtexto{
  font-size: 12px;
  letter-spacing: 2px;
  opacity: 0.94;
}

/* Texto del bautizo */
.premium-bautizo{
  margin-top: 18px;
  font-size: 16px;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.94);
}

/* Cuenta regresiva abajo */
.premium-countdown{
  position: absolute;
  left: 0;
  right: 0;
  bottom: 34px;
  z-index: 4;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 0 18px;
  text-align: center;
  color: white;
}

.premium-count-item{
  display: flex;
  flex-direction: column;
  align-items: center;
}

.premium-count-num{
  font-size: 34px;
  font-weight: bold;
  line-height: 1;
  margin-bottom: 6px;
  color: white;
}

.premium-count-label{
  font-size: 10px;
  letter-spacing: 1.6px;
  opacity: 0.92;
}

/* Barra de música más discreta */
.barra-musica{
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 60;
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.28);
  border-radius: 999px;
  padding: 8px;
  box-shadow: 0 10px 24px rgba(0,0,0,0.12);
  backdrop-filter: blur(8px);
}

.musica-contenido{
  display: flex;
  align-items: center;
  gap: 8px;
}

.boton-musica{
  background: rgba(255,255,255,0.2);
  color: white;
  border: 1px solid rgba(255,255,255,0.22);
  padding: 10px 16px;
  border-radius: 999px;
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
}

.estado-musica{
  color: white;
  font-size: 14px;
  padding-right: 6px;
}

/* Ajustes para móvil */
@media (max-width: 700px){
  .premium-card{
    min-height: 90vh;
    border-radius: 28px;
  }

  .premium-contenido{
    padding: 70px 16px 140px 16px;
  }

  .premium-nombres-box{
    max-width: 280px;
    padding: 14px 14px 12px 14px;
  }

  .premium-nombres{
    font-size: 28px;
  }

  .premium-subtexto{
    font-size: 11px;
    letter-spacing: 1.2px;
  }

  .premium-bautizo{
    font-size: 14px;
  }

  .premium-countdown{
    bottom: 24px;
    gap: 4px;
    padding: 0 12px;
  }

  .premium-count-num{
    font-size: 28px;
  }

  .premium-count-label{
    font-size: 9px;
    letter-spacing: 1px;
  }

  .premium-encabezado{
  text-align: center;
  margin-bottom: 18px;
  color: white;
  }

  .premium-invita{
  font-size: 15px;
  letter-spacing: 1px;
  margin-bottom: 10px;
  color: rgba(255,255,255,0.95);
  }

  .premium-titulo-superior{
  font-size: 20px;
  letter-spacing: 4px;
  font-weight: normal;
  color: rgba(255,255,255,0.98);
  }
  
}
  </style>
</head>
<body>

  <!-- AUDIO -->
  <audio id="musica" loop>
    <source src="assets/all-of-me.mp3" type="audio/mpeg">
  </audio>

  <!-- BARRA DE CONTROL DE MÚSICA -->
  <div class="barra-musica oculto" id="barraMusica">
    <div class="musica-contenido">
      <button class="boton-musica" id="btnMusica">❚❚ Pausar música</button>
      <div class="estado-musica" id="estadoMusica">Reproduciendo</div>
    </div>
  </div>

  <!-- PRIMERA PANTALLA -->
  <section class="pantalla" id="pantalla1">
    <div class="tarjeta">
      <div class="subtitulo">Nuestra boda y bautizo</div>

      <div class="nombres-principales">
        Zayr <br> &amp; José Manuel
      </div>

      <img src="assets/Sobre.jpeg" alt="Sobre de invitación" class="sobre">

      <div class="texto-secundario">Sábado</div>
      <div class="fecha">09 de mayo de 2026</div>

      <button class="boton-abrir" id="btnAbrir">
        Presione para abrir la invitación
      </button>
    </div>
  </section>

  <!-- SEGUNDA PANTALLA -->
  <section class="pantalla oculto pantalla-estilo-premium" id="pantalla2">
  <div class="premium-card">

    <!-- Foto principal de fondo -->
    <img src="assets/foto3.jpeg" alt="Foto principal" class="premium-fondo">

    <!-- Capa oscura suave -->
    <div class="premium-overlay"></div>

    <!-- Capa diagonal translúcida -->
    <div class="premium-diagonal"></div>

    <!-- Contenido principal -->
    <div class="premium-contenido">

      <div class="premium-encabezado">
        <div class="premium-invita">Te Invitamos a Celebrar con Nosotros</div>
        <div class="premium-titulo-superior">NUESTRA BODA</div>
      </div>

      <div class="premium-adorno">✦</div>

      <div class="premium-nombres-box">
        <div class="premium-nombres">
          Zayr &amp; José Manuel
        </div>
        <div class="premium-subtexto">
          09.05.2026;
        </div>
      </div>

    </div>

    <!-- Cuenta regresiva abajo -->
    <div class="premium-countdown">
      <div class="premium-count-item">
        <div class="premium-count-num" id="dias">0</div>
        <div class="premium-count-label">DÍAS</div>
      </div>

      <div class="premium-count-item">
        <div class="premium-count-num" id="horas">0</div>
        <div class="premium-count-label">HORAS</div>
      </div>

      <div class="premium-count-item">
        <div class="premium-count-num" id="minutos">0</div>
        <div class="premium-count-label">MINUTOS</div>
      </div>

      <div class="premium-count-item">
        <div class="premium-count-num" id="segundos">0</div>
        <div class="premium-count-label">SEGUNDOS</div>
      </div>
    </div>

  </div>
</section>
  <script>
    /* ======================================================
       ELEMENTOS DEL HTML
    ====================================================== */
    const pantalla1 = document.getElementById("pantalla1");
    const pantalla2 = document.getElementById("pantalla2");
    const btnAbrir = document.getElementById("btnAbrir");

    const musica = document.getElementById("musica");
    const barraMusica = document.getElementById("barraMusica");
    const btnMusica = document.getElementById("btnMusica");
    const estadoMusica = document.getElementById("estadoMusica");

    const dias = document.getElementById("dias");
    const horas = document.getElementById("horas");
    const minutos = document.getElementById("minutos");
    const segundos = document.getElementById("segundos");

    let musicaActiva = false;

    /* ======================================================
       FECHA DEL EVENTO
    ====================================================== */
    const fechaEvento = new Date("2026-05-09T11:00:00-06:00").getTime();

    /* ======================================================
       CUENTA REGRESIVA
    ====================================================== */
    function actualizarCuenta() {
      const ahora = new Date().getTime();
      const diferencia = fechaEvento - ahora;

      if (diferencia <= 0) {
        dias.textContent = "0";
        horas.textContent = "0";
        minutos.textContent = "0";
        segundos.textContent = "0";
        return;
      }

      const d = Math.floor(diferencia / (1000 * 60 * 60 * 24));
      const h = Math.floor((diferencia / (1000 * 60 * 60)) % 24);
      const m = Math.floor((diferencia / (1000 * 60)) % 60);
      const s = Math.floor((diferencia / 1000) % 60);

      dias.textContent = d;
      horas.textContent = h;
      minutos.textContent = m;
      segundos.textContent = s;
    }

    actualizarCuenta();
    setInterval(actualizarCuenta, 1000);

    /* ======================================================
       FUNCIONES DE MÚSICA
    ====================================================== */
    async function reproducirMusica() {
      try {
        await musica.play();
        musicaActiva = true;
        btnMusica.textContent = "❚❚ Pausar música";
        estadoMusica.textContent = "Reproduciendo";
      } catch (error) {
        musicaActiva = false;
        btnMusica.textContent = "▶ Reproducir música";
        estadoMusica.textContent = "Bloqueada por el navegador";
      }
    }

    function pausarMusica() {
      musica.pause();
      musicaActiva = false;
      btnMusica.textContent = "▶ Reproducir música";
      estadoMusica.textContent = "Pausada";
    }

    /* ======================================================
       ABRIR INVITACIÓN
    ====================================================== */
    btnAbrir.addEventListener("click", async function () {
      pantalla1.classList.add("oculto");
      pantalla2.classList.remove("oculto");
      barraMusica.classList.remove("oculto");

      musica.volume = 0.7;
      await reproducirMusica();
    });

    /* ======================================================
       BOTÓN DE PAUSAR / REPRODUCIR
    ====================================================== */
    btnMusica.addEventListener("click", async function () {
      if (musicaActiva) {
        pausarMusica();
      } else {
        await reproducirMusica();
      }
    });

    /* ======================================================
       PAUSAR SI EL USUARIO CAMBIA DE APP O PESTAÑA
    ====================================================== */
    document.addEventListener("visibilitychange", function () {
      if (document.hidden) {
        if (!musica.paused) {
          musica.pause();
          musicaActiva = false;
          btnMusica.textContent = "▶ Reproducir música";
          estadoMusica.textContent = "Pausada";
        }
      }
    });

    /* ======================================================
       PAUSAR SI LA PÁGINA PIERDE EL FOCO
       Esto ayuda en algunos navegadores móviles
    ====================================================== */
    window.addEventListener("blur", function () {
      if (!musica.paused) {
        musica.pause();
        musicaActiva = false;
        btnMusica.textContent = "▶ Reproducir música";
        estadoMusica.textContent = "Pausada";
      }
    });
  </script>

</body>
</html>
